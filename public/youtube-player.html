<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>YouTube Player</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #player, iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
      #player iframe { opacity: 0; transition: opacity .18s ease; }
      body.ready #player iframe { opacity: 1; }
      #cover { position: absolute; inset: 0; z-index: 2; display: grid; place-items: center; padding: 24px; text-align: center; background: #000; color: rgba(255,255,255,.82); font-size: 13px; font-weight: 800; }
      body.ready #cover { display: none; }
      #fallback { position: absolute; inset: 0; z-index: 3; display: none; place-items: center; padding: 24px; text-align: center; background: #000; }
      #fallback.active { display: grid; }
      .fallback-box { max-width: 360px; }
      .fallback-title { font-size: 17px; font-weight: 800; margin: 0 0 8px; }
      .fallback-copy { font-size: 13px; line-height: 1.45; color: rgba(255,255,255,.72); margin: 0 0 18px; }
      .fallback-button { appearance: none; border: 0; border-radius: 999px; background: #fff; color: #000; min-height: 44px; padding: 0 18px; font-weight: 800; font-size: 14px; }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <div id="cover" aria-live="polite">Loading video…</div>
    <div id="fallback" role="alert">
      <div class="fallback-box">
        <p class="fallback-title">Video is still loading</p>
        <p class="fallback-copy">Please try once more.</p>
        <button id="retry-youtube" class="fallback-button" type="button">Retry</button>
      </div>
    </div>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var videoId = params.get("v") || "";
        var validVideoId = /^[a-zA-Z0-9_-]{11}$/.test(videoId);
        var fallback = document.getElementById("fallback");
        var retryButton = document.getElementById("retry-youtube");
        var player;
        var progressTimer;

        function targetOrigin() {
          return window.location.origin && window.location.origin !== "null" ? window.location.origin : "*";
        }

        function post(type, payload) {
          try {
            window.parent.postMessage(Object.assign({ source: "bbdo-youtube-player", type: type, videoId: videoId }, payload || {}), targetOrigin());
          } catch (_) {}
        }

        function embedUrl() {
          var embedParams = new URLSearchParams({
            autoplay: params.get("autoplay") || "1",
            controls: params.get("controls") || "1",
            rel: params.get("rel") || "0",
            modestbranding: params.get("modestbranding") || "1",
            playsinline: params.get("playsinline") || "1",
            fs: params.get("fs") || "1",
            start: params.get("start") || "0",
            cc_load_policy: "0",
            cc_lang_pref: "none",
            hl: "en",
            iv_load_policy: "3"
          });
          return "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(videoId) + "?" + embedParams.toString();
        }

        function showFallback(code) {
          document.body.classList.remove("ready");
          fallback.classList.add("active");
          post("error", { code: Number(code) || 153 });
          if (progressTimer) window.clearInterval(progressTimer);
        }

        function snapshot() {
          var currentTime = 0;
          var duration = 0;
          try {
            currentTime = Number(player && player.getCurrentTime ? player.getCurrentTime() : 0) || 0;
            duration = Number(player && player.getDuration ? player.getDuration() : 0) || 0;
          } catch (_) {}
          return { currentTime: currentTime, duration: duration };
        }

        retryButton.addEventListener("click", function () {
          window.location.reload();
        });

        if (!validVideoId) {
          showFallback(2);
          return;
        }

        if (params.get("mode") === "simple") {
          var iframe = document.createElement("iframe");
          iframe.src = embedUrl();
          iframe.title = "YouTube video player";
          iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen";
          iframe.allowFullscreen = true;
          iframe.setAttribute("allowfullscreen", "");
          iframe.setAttribute("webkitallowfullscreen", "");
          iframe.setAttribute("mozallowfullscreen", "");
          iframe.referrerPolicy = "strict-origin-when-cross-origin";
          document.getElementById("player").appendChild(iframe);
          iframe.addEventListener("load", function () { document.body.classList.add("ready"); });
          post("ready", { currentTime: 0, duration: 0 });
          return;
        }

        window.onYouTubeIframeAPIReady = function () {
          player = new window.YT.Player("player", {
            videoId: videoId,
            host: "https://www.youtube-nocookie.com",
            playerVars: {
              autoplay: params.get("autoplay") || "1",
              controls: params.get("controls") || "1",
              rel: params.get("rel") || "0",
              modestbranding: params.get("modestbranding") || "1",
              playsinline: params.get("playsinline") || "1",
              fs: params.get("fs") || "1",
              enablejsapi: "1",
              origin: window.location.origin,
              widget_referrer: window.location.origin,
              start: params.get("start") || "0",
              cc_load_policy: 0,
              cc_lang_pref: "none",
              hl: "en",
              iv_load_policy: 3
            },
            events: {
              onReady: function () {
                var frame = document.querySelector("iframe");
                if (frame) frame.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
                try { player.unloadModule && player.unloadModule("captions"); } catch (_) {}
                try { player.unloadModule && player.unloadModule("cc"); } catch (_) {}
                try { player.setOption && player.setOption("captions", "track", {}); } catch (_) {}
                document.body.classList.add("ready");
                post("ready", snapshot());
                progressTimer = window.setInterval(function () {
                  post("progress", snapshot());
                }, 1000);
              },
              onStateChange: function (event) {
                post("state", Object.assign({ state: event.data }, snapshot()));
              },
              onError: function (event) {
                showFallback(event && event.data);
              }
            }
          });
        };

        var script = document.createElement("script");
        script.src = "https://www.youtube.com/iframe_api";
        script.async = true;
        script.onerror = function () { showFallback(153); };
        document.head.appendChild(script);
      })();
    </script>
  </body>
</html>
